name: Development Build

on:
  push:
    branches: [ "main", "master", "develop" ]
  pull_request:
    branches: [ "main", "master", "develop" ]
  workflow_dispatch:

jobs:
  # ----------------- Android Debug 构建 -----------------
  build-android:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
    - uses: actions/checkout@v4
    - name: Read Version
      id: version
      run: |
        VERSION=$(grep "^project.version=" gradle.properties | cut -d'=' -f2 | tr -d '\r')
        echo "version=$VERSION" >> $GITHUB_OUTPUT
    - name: set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'liberica'
        cache: gradle
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
    - name: Write Aifadian Config
      env:
        AIFADIAN_API_TOKEN: ${{ secrets.AIFADIAN_API_TOKEN }}
        AIFADIAN_USER_ID: ${{ secrets.AIFADIAN_USER_ID }}
      run: |
        if [ -n "$AIFADIAN_API_TOKEN" ]; then
          echo "AIFADIAN_API_TOKEN=$AIFADIAN_API_TOKEN" >> local.properties
          echo "AIFADIAN_USER_ID=$AIFADIAN_USER_ID" >> local.properties
        fi
    - name: Build Android Debug
      continue-on-error: true
      run: ./gradlew :composeApp:assembleDebug
    - name: Prepare Android Artifact
      continue-on-error: true
      run: |
        mkdir -p ci-artifacts
        APK=$(ls composeApp/build/outputs/apk/debug/*.apk 2>/dev/null | head -n 1)
        if [ -z "$APK" ]; then
          echo "No debug APK found, skipping"
          exit 0
        fi
        cp "$APK" "ci-artifacts/MicYou-Android-${{ steps.version.outputs.version }}.apk"
    - name: Upload Android Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: MicYou-Android-${{ steps.version.outputs.version }}
        path: ci-artifacts/MicYou-Android-${{ steps.version.outputs.version }}.apk
        if-no-files-found: ignore

  # ----------------- Tauri Windows 构建 -----------------
  build-tauri-windows:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    - name: Read Version
      id: version
      shell: pwsh
      run: |
        $line = (Select-String -Path gradle.properties -Pattern '^project\.version=').Line
        $version = $line.Split('=')[1].Trim()
        "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: npm
        cache-dependency-path: tauri-app/package-lock.json
    - name: Setup Rust (stable)
      uses: dtolnay/rust-toolchain@stable
    - name: Install Frontend Dependencies
      run: npm ci
      working-directory: tauri-app
    - name: Build Tauri App (Windows)
      run: npx tauri build --no-bundle
      working-directory: tauri-app
    - name: Build Inno Setup Installer
      shell: pwsh
      working-directory: tauri-app
      run: |
        $version = '${{ steps.version.outputs.version }}'
        New-Item -ItemType Directory -Force -Path "src-tauri/target/release" | Out-Null
        $bin = Get-ChildItem -Path . -Recurse -Filter "*.exe" | Where-Object { $_.Name -match "(micyou|MicYou)" -and $_.FullName -notmatch "bundle" } | Select-Object -First 1
        if ($bin) {
          Copy-Item $bin.FullName "src-tauri/target/release/micyou-app.exe" -Force
          Copy-Item $bin.FullName "src-tauri/target/release/MicYou.exe" -Force
        }
        iscc /DMyAppVersion="$version" src-tauri/installer.iss
    - name: Prepare Artifact
      shell: pwsh
      run: |
        New-Item -ItemType Directory -Force -Path ci-artifacts | Out-Null
        $version = '${{ steps.version.outputs.version }}'
        $installer = Get-ChildItem -Path tauri-app/src-tauri/target/release/bundle/inno -Filter *.exe -ErrorAction SilentlyContinue | Select-Object -First 1
        if (-not $installer) {
          Write-Warning "No installer found, skipping artifact upload"
          exit 0
        }
        Copy-Item $installer.FullName "ci-artifacts/MicYou-Win-$version-installer.exe" -Force
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: MicYou-Win-${{ steps.version.outputs.version }}
        path: ci-artifacts/MicYou-Win-${{ steps.version.outputs.version }}-installer.exe
        if-no-files-found: ignore

  # ----------------- Tauri macOS 构建 (x64 + arm64) -----------------
  build-tauri-macos:
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            runner: macos-26-intel
            target: x86_64-apple-darwin
          - arch: arm64
            runner: macos-latest
            target: aarch64-apple-darwin
    runs-on: ${{ matrix.runner }}
    steps:
    - uses: actions/checkout@v4
    - name: Read Version
      id: version
      run: |
        VERSION=$(grep "^project.version=" gradle.properties | cut -d'=' -f2 | tr -d '\r')
        echo "version=$VERSION" >> $GITHUB_OUTPUT
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: npm
        cache-dependency-path: tauri-app/package-lock.json
    - name: Setup Rust (stable)
      uses: dtolnay/rust-toolchain@stable
    - name: Setup Rust Target
      run: rustup target add ${{ matrix.target }}
    - name: Install Frontend Dependencies
      run: npm ci
      working-directory: tauri-app
    - name: Install ONNX Runtime (macOS x64)
      if: matrix.arch == 'x64'
      run: |
        brew install onnxruntime
        PREFIX=$(brew --prefix onnxruntime)
        mkdir -p $PREFIX/include/onnxruntime
        cp $PREFIX/include/*.h $PREFIX/include/onnxruntime/ 2>/dev/null || true
        if [ -d "$PREFIX/include/onnxruntime" ]; then
          cp $PREFIX/include/onnxruntime/*.h $PREFIX/include/ 2>/dev/null || true
        fi
        echo "ORT_STRATEGY=system" >> $GITHUB_ENV
        echo "ORT_LIB_PATH=$PREFIX" >> $GITHUB_ENV
        echo "ORT_LIB_LOCATION=$PREFIX" >> $GITHUB_ENV
        echo "ORT_DYLIB_PATH=$PREFIX/lib/libonnxruntime.dylib" >> $GITHUB_ENV
        echo "LIBRARY_PATH=$PREFIX/lib:$LIBRARY_PATH" >> $GITHUB_ENV
        echo "DYLD_LIBRARY_PATH=$PREFIX/lib:$DYLD_LIBRARY_PATH" >> $GITHUB_ENV
    - name: Build Tauri App (macOS)
      run: npx tauri build --bundles dmg --target ${{ matrix.target }}
      working-directory: tauri-app
    - name: Prepare Artifact
      run: |
        mkdir -p ci-artifacts
        DMG=$(ls tauri-app/src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg 2>/dev/null | head -1)
        if [ -z "$DMG" ]; then
          echo "No DMG found, skipping artifact upload"
          exit 0
        fi
        cp "$DMG" "ci-artifacts/MicYou-macOS-${{ steps.version.outputs.version }}-${{ matrix.arch }}.dmg"
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: MicYou-macOS-${{ matrix.arch }}-${{ steps.version.outputs.version }}
        path: ci-artifacts/MicYou-macOS-${{ steps.version.outputs.version }}-${{ matrix.arch }}.dmg
        if-no-files-found: ignore

  # ----------------- Tauri Linux 构建 -----------------
  build-tauri-linux:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Read Version
      id: version
      run: |
        VERSION=$(grep "^project.version=" gradle.properties | cut -d'=' -f2 | tr -d '\r')
        echo "version=$VERSION" >> $GITHUB_OUTPUT
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: npm
        cache-dependency-path: tauri-app/package-lock.json
    - name: Setup Rust (stable)
      uses: dtolnay/rust-toolchain@stable
    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          libwebkit2gtk-4.1-dev \
          libayatana-appindicator3-dev \
          librsvg2-dev \
          patchelf \
          libxdo-dev \
          libssl-dev \
          libasound2-dev
    - name: Install Frontend Dependencies
      run: npm ci
      working-directory: tauri-app
    - name: Build Tauri App (Linux)
      run: npx tauri build --bundles deb,rpm,appimage
      working-directory: tauri-app
    - name: Prepare Artifacts
      run: |
        mkdir -p ci-artifacts
        VER="${{ steps.version.outputs.version }}"
        shopt -s nullglob
        deb_files=( tauri-app/src-tauri/target/release/bundle/deb/*.deb )
        rpm_files=( tauri-app/src-tauri/target/release/bundle/rpm/*.rpm )
        appimage_files=( tauri-app/src-tauri/target/release/bundle/appimage/*.AppImage )
        if [ ${#deb_files[@]} -gt 0 ]; then cp "${deb_files[0]}" "ci-artifacts/MicYou-Linux-$VER.deb"; fi
        if [ ${#rpm_files[@]} -gt 0 ]; then cp "${rpm_files[0]}" "ci-artifacts/MicYou-Linux-$VER.rpm"; fi
        if [ ${#appimage_files[@]} -gt 0 ]; then cp "${appimage_files[0]}" "ci-artifacts/MicYou-Linux-$VER.AppImage"; fi
    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: MicYou-Linux-${{ steps.version.outputs.version }}
        path: ci-artifacts/
        if-no-files-found: ignore
