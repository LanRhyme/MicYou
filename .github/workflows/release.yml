name: Release Build

on:
  push:
    tags:
      - 'v*'
      - '!v*-alpha*'
      - '!v*-beta*'
      - '!v*-rc*'
      - '!v*-pre*'
      - '!v*-preview*'
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  # ----------------- Android Release 构建 -----------------
  build-android:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - name: Read Version
      id: version
      run: |
        VERSION=$(grep "^project.version=" gradle.properties | cut -d'=' -f2 | tr -d '\r')
        echo "version=$VERSION" >> $GITHUB_OUTPUT
    - name: set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'liberica'
        cache: gradle
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
    - name: Decode Keystore
      continue-on-error: true
      env:
        ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
      run: |
        if [ -n "$ANDROID_KEYSTORE_BASE64" ]; then
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > release.keystore
        fi
    - name: Write Aifadian Config
      env:
        AIFADIAN_API_TOKEN: ${{ secrets.AIFADIAN_API_TOKEN }}
        AIFADIAN_USER_ID: ${{ secrets.AIFADIAN_USER_ID }}
      run: |
        if [ -n "$AIFADIAN_API_TOKEN" ]; then
          echo "AIFADIAN_API_TOKEN=$AIFADIAN_API_TOKEN" >> local.properties
          echo "AIFADIAN_USER_ID=$AIFADIAN_USER_ID" >> local.properties
        fi
    - name: Build Android Release
      continue-on-error: true
      env:
        ANDROID_KEYSTORE_PATH: ${{ github.workspace }}/release.keystore
        ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
        ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
      run: ./gradlew :composeApp:assembleRelease
    - name: Prepare Android Artifact
      continue-on-error: true
      run: |
        mkdir -p ci-artifacts
        APK=$(ls composeApp/build/outputs/apk/release/*.apk 2>/dev/null | head -n 1)
        if [ -z "$APK" ]; then
          echo "No release APK found, skipping"
          exit 0
        fi
        cp "$APK" "ci-artifacts/MicYou-Android-${{ steps.version.outputs.version }}.apk"
    - name: Upload Android Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: MicYou-Android-${{ steps.version.outputs.version }}
        path: ci-artifacts/MicYou-Android-${{ steps.version.outputs.version }}.apk
        if-no-files-found: ignore

  # ----------------- Tauri Windows 构建 -----------------
  build-tauri-windows:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    - name: Read Version
      id: version
      shell: pwsh
      run: |
        $line = (Select-String -Path gradle.properties -Pattern '^project\.version=').Line
        $version = $line.Split('=')[1].Trim()
        "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: npm
        cache-dependency-path: tauri-app/package-lock.json
    - name: Setup Rust (stable)
      uses: dtolnay/rust-toolchain@stable
    - name: Install Frontend Dependencies
      run: npm ci
      working-directory: tauri-app
    - name: Build Tauri App (Windows)
      run: npx tauri build --bundles msi
      working-directory: tauri-app
    - name: Prepare Artifact
      shell: pwsh
      run: |
        New-Item -ItemType Directory -Force -Path ci-artifacts | Out-Null
        $version = '${{ steps.version.outputs.version }}'
        $installer = Get-ChildItem -Path tauri-app/src-tauri/target/release/bundle/msi -Filter *.msi -ErrorAction SilentlyContinue | Select-Object -First 1
        if (-not $installer) {
          Write-Warning "No MSI installer found, trying exe..."
          $installer = Get-ChildItem -Path tauri-app/src-tauri/target/release/bundle/nsis -Filter *.exe -ErrorAction SilentlyContinue | Select-Object -First 1
        }
        if (-not $installer) {
          Write-Warning "No installer found, skipping artifact upload"
          exit 0
        }
        Copy-Item $installer.FullName "ci-artifacts/MicYou-Win-$version-installer.msi" -Force
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: MicYou-Win-${{ steps.version.outputs.version }}
        path: ci-artifacts/MicYou-Win-${{ steps.version.outputs.version }}-installer.msi
        if-no-files-found: ignore

  # ----------------- Tauri macOS 构建 (x64 + arm64) -----------------
  build-tauri-macos:
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            runner: macos-13
            target: x86_64-apple-darwin
          - arch: arm64
            runner: macos-latest
            target: aarch64-apple-darwin
    runs-on: ${{ matrix.runner }}
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - name: Read Version
      id: version
      run: |
        VERSION=$(grep "^project.version=" gradle.properties | cut -d'=' -f2 | tr -d '\r')
        echo "version=$VERSION" >> $GITHUB_OUTPUT
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: npm
        cache-dependency-path: tauri-app/package-lock.json
    - name: Setup Rust (stable)
      uses: dtolnay/rust-toolchain@stable
    - name: Setup Rust Target
      run: rustup target add ${{ matrix.target }}
    - name: Install Frontend Dependencies
      run: npm ci
      working-directory: tauri-app
    - name: Build Tauri App (macOS)
      run: npx tauri build --bundles dmg --target ${{ matrix.target }}
      working-directory: tauri-app
    - name: Prepare Artifact
      run: |
        mkdir -p ci-artifacts
        DMG=$(ls tauri-app/src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg 2>/dev/null | head -1)
        if [ -z "$DMG" ]; then
          echo "No DMG found, skipping artifact upload"
          exit 0
        fi
        cp "$DMG" "ci-artifacts/MicYou-macOS-${{ steps.version.outputs.version }}-${{ matrix.arch }}.dmg"
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: MicYou-macOS-${{ matrix.arch }}-${{ steps.version.outputs.version }}
        path: ci-artifacts/MicYou-macOS-${{ steps.version.outputs.version }}-${{ matrix.arch }}.dmg
        if-no-files-found: ignore

  # ----------------- Tauri Linux 构建 -----------------
  build-tauri-linux:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Read Version
      id: version
      run: |
        VERSION=$(grep "^project.version=" gradle.properties | cut -d'=' -f2 | tr -d '\r')
        echo "version=$VERSION" >> $GITHUB_OUTPUT
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: npm
        cache-dependency-path: tauri-app/package-lock.json
    - name: Setup Rust (stable)
      uses: dtolnay/rust-toolchain@stable
    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          libwebkit2gtk-4.1-dev \
          libayatana-appindicator3-dev \
          librsvg2-dev \
          patchelf \
          libxdo-dev \
          libssl-dev \
          libasound2-dev
    - name: Install Frontend Dependencies
      run: npm ci
      working-directory: tauri-app
    - name: Build Tauri App (Linux)
      run: npx tauri build --bundles deb,rpm,appimage
      working-directory: tauri-app
    - name: Prepare Artifacts
      run: |
        mkdir -p ci-artifacts
        VER="${{ steps.version.outputs.version }}"
        shopt -s nullglob
        deb_files=( tauri-app/src-tauri/target/release/bundle/deb/*.deb )
        rpm_files=( tauri-app/src-tauri/target/release/bundle/rpm/*.rpm )
        appimage_files=( tauri-app/src-tauri/target/release/bundle/appimage/*.AppImage )
        if [ ${#deb_files[@]} -gt 0 ]; then cp "${deb_files[0]}" "ci-artifacts/MicYou-Linux-$VER.deb"; fi
        if [ ${#rpm_files[@]} -gt 0 ]; then cp "${rpm_files[0]}" "ci-artifacts/MicYou-Linux-$VER.rpm"; fi
        if [ ${#appimage_files[@]} -gt 0 ]; then cp "${appimage_files[0]}" "ci-artifacts/MicYou-Linux-$VER.AppImage"; fi
    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: MicYou-Linux-${{ steps.version.outputs.version }}
        path: ci-artifacts/
        if-no-files-found: ignore

  # ----------------- 发布 Release -----------------
  release:
    needs: [build-tauri-windows, build-tauri-linux, build-tauri-macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true
      - name: Get Last Contributor
        id: contributor
        run: |
          AUTHOR_NAME=$(git log -1 --format='%an')
          AUTHOR_EMAIL=$(git log -1 --format='%ae')
          echo "name=$AUTHOR_NAME" >> $GITHUB_OUTPUT
          echo "email=$AUTHOR_EMAIL" >> $GITHUB_OUTPUT
          echo "Last contributor: $AUTHOR_NAME <$AUTHOR_EMAIL>"
      - name: Configure Git
        run: |
          git config --global user.name "${{ steps.contributor.outputs.name }}"
          git config --global user.email "${{ steps.contributor.outputs.email }}"
      - name: Determine Tag Name
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "push" ] && [ -n "${{ github.ref_name }}" ]; then
            TAG_NAME="${{ github.ref_name }}"
          else
            VERSION=$(grep "project.version=" gradle.properties | cut -d'=' -f2)
            TAG_NAME="v$VERSION"
          fi
          echo "tag_name=$TAG_NAME" >> $GITHUB_OUTPUT
          echo "Using tag: $TAG_NAME"
      - name: Create Tag (if not exists)
        run: |
          if git rev-parse "${{ steps.tag.outputs.tag_name }}" >/dev/null 2>&1; then
            echo "Tag ${{ steps.tag.outputs.tag_name }} already exists"
          else
            git tag "${{ steps.tag.outputs.tag_name }}"
            git push origin "${{ steps.tag.outputs.tag_name }}"
          fi
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag_name }}
          files: release-artifacts/**/*
          generate_release_notes: true
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Trigger MirrorChyanUploading
        if: ${{ github.repository_owner == 'LanRhyme' }}
        run: |
          gh workflow run --repo $GITHUB_REPOSITORY mirrorchyan_release.yml -f tag=${{ steps.tag.outputs.tag_name }}
          gh workflow run --repo $GITHUB_REPOSITORY mirrorchyan_release_note.yml -f tag=${{ steps.tag.outputs.tag_name }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
