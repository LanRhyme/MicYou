<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#111418">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="MicYou">
    <meta name="mobile-web-app-capable" content="yes">
    <title>MicYou Web Audio</title>
    <script defer src="alpine.min.js"></script>
    <style>
        :root {
            --md-primary: #7CB8F9;
            --md-on-primary: #003256;
            --md-primary-container: #0E4B7A;
            --md-on-primary-container: #D1E4FF;
            --md-secondary: #BAC7DB;
            --md-on-secondary: #253140;
            --md-secondary-container: #3B4858;
            --md-on-secondary-container: #D6E3F7;
            --md-tertiary: #D3BCE5;
            --md-on-tertiary: #382D49;
            --md-error: #FFB4AB;
            --md-on-error: #690005;
            --md-error-container: #93000A;
            --md-on-error-container: #FFDAD6;
            --md-surface: #111418;
            --md-on-surface: #E2E2E6;
            --md-on-surface-variant: #C2C6CF;
            --md-surface-bright: #37393E;
            --md-surface-container: #1E2024;
            --md-surface-container-high: #282A2F;
            --md-surface-container-highest: #333539;
            --md-surface-container-low: #1A1C20;
            --md-outline: #8C909A;
            --md-outline-variant: #42474F;
            --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
            --ease-out-expo: cubic-bezier(0.16, 1, 0.3, 1);
            --ease-in-out-back: cubic-bezier(0.68, -0.6, 0.32, 1.6);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { overflow-x: hidden; overflow-y: auto; -webkit-overflow-scrolling: touch; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--md-surface);
            min-height: 100dvh;
            display: flex; flex-direction: column;
            align-items: center;
            color: var(--md-on-surface);
            padding: 0;
            padding-left: max(0px, env(safe-area-inset-left));
            padding-right: max(0px, env(safe-area-inset-right));
            -webkit-tap-highlight-color: transparent;
            -webkit-user-select: none;
            user-select: none;
        }
        .status-bar-bg {
            width: 100%; max-width: 420px;
            height: max(28px, env(safe-area-inset-top));
            background: transparent;
            flex-shrink: 0;
        }
        .app-container {
            max-width: 420px; width: 100%;
            flex: 1;
            display: flex; flex-direction: column;
            gap: 10px;
            padding: 0 16px;
            padding-bottom: 100px;
        }

        .card {
            background: rgba(55, 57, 62, 0.75);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 12px;
            width: 100%;
        }
        @supports not (backdrop-filter: blur(1px)) {
            .card {
                background: var(--md-surface-bright);
            }
        }

        .header-card {
            display: flex; align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
            position: relative;
            z-index: 10;
        }
        .header-left {
            display: flex; align-items: center; gap: 12px;
        }
        .app-icon-badge {
            width: 36px; height: 36px;
            background: var(--md-primary-container);
            border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
        }
        .app-icon-badge svg { width: 20px; height: 20px; }
        .header-title {
            font-size: 0.95em; font-weight: 600;
            color: var(--md-primary);
        }
        .header-subtitle {
            font-size: 0.72em; color: var(--md-on-surface-variant);
            margin-top: 1px;
        }
        .lang-dropdown {
            position: relative;
        }
        .lang-trigger {
            display: flex;
            align-items: center;
            gap: 7px;
            padding: 9px 13px;
            background: var(--md-surface-container-highest);
            border: 1px solid var(--md-outline-variant);
            border-radius: 13px;
            cursor: pointer;
            font-size: 0.82em;
            font-weight: 500;
            color: var(--md-on-surface-variant);
            transition: all 0.25s ease;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
            min-height: 42px;
            user-select: none;
        }
        .lang-trigger svg {
            fill: currentColor;
        }
        .lang-trigger:hover {
            border-color: var(--md-outline);
            background: var(--md-surface-container-high);
        }
        .lang-trigger:active {
            transform: scale(0.95);
        }
        .lang-trigger svg.lang-globe {
            width: 18px;
            height: 18px;
            flex-shrink: 0;
        }
        .lang-trigger .lang-label {
            font-variant-numeric: tabular-nums;
        }
        .lang-trigger svg.lang-chevron {
            width: 14px;
            height: 14px;
            flex-shrink: 0;
            transition: transform 0.3s var(--ease-spring);
        }
        .lang-trigger.open svg.lang-chevron {
            transform: rotate(180deg);
        }
        .lang-menu {
            position: absolute;
            top: calc(100% + 6px);
            right: 0;
            min-width: 130px;
            background: var(--md-surface-container-high);
            border: 1px solid var(--md-outline-variant);
            border-radius: 14px;
            padding: 6px;
            box-shadow: 0 8px 28px rgba(0,0,0,0.45), 0 2px 8px rgba(0,0,0,0.3);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            z-index: 50;
            transform-origin: top right;
            transition: opacity 0.2s ease, transform 0.28s var(--ease-spring);
        }
        .lang-menu.closed {
            opacity: 0;
            pointer-events: none;
            transform: scale(0.85) translateY(-6px);
        }
        .lang-menu.open {
            opacity: 1;
            pointer-events: auto;
            transform: scale(1) translateY(0);
        }
        .lang-menu-item {
            display: flex;
            align-items: center;
            gap: 10px;
            width: 100%;
            padding: 12px 14px;
            border: none;
            border-radius: 10px;
            background: transparent;
            color: var(--md-on-surface-variant);
            font-size: 0.85em;
            font-weight: 400;
            cursor: pointer;
            transition: all 0.18s ease;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
            min-height: 44px;
            text-align: left;
        }
        .lang-menu-item svg {
            fill: currentColor;
        }
        .lang-menu-item:hover {
            background: rgba(124,184,249,0.1);
            color: var(--md-on-surface);
        }
        .lang-menu-item:active {
            background: rgba(124,184,249,0.18);
            transform: scale(0.97);
        }
        .lang-menu-item.active {
            background: var(--md-primary-container);
            color: var(--md-on-primary-container);
        }
        .lang-menu-item .check-mark {
            margin-left: auto;
            width: 16px;
            height: 16px;
            flex-shrink: 0;
            opacity: 0;
            transition: opacity 0.18s ease;
        }
        .lang-menu-item.active .check-mark {
            opacity: 1;
        }
        .lang-menu-backdrop {
            position: fixed;
            inset: 0;
            z-index: 49;
        }

        .status-card {
            display: flex; flex-direction: column;
            align-items: center; gap: 10px;
            padding: 16px 12px;
        }
        .status-icon-wrap {
            width: 52px; height: 52px;
            border-radius: 14px;
            display: flex; align-items: center; justify-content: center;
            transition: background 0.3s ease;
        }
        .status-icon-wrap svg { width: 26px; height: 26px; }
        .status-icon-wrap.idle { background: rgba(194,198,207,0.12); }
        .status-icon-wrap.idle svg { color: var(--md-on-surface-variant); fill: var(--md-on-surface-variant); }
        .status-icon-wrap.acquiring { background: rgba(211,188,229,0.15); }
        .status-icon-wrap.acquiring svg { color: var(--md-tertiary); fill: var(--md-tertiary); animation: mic-pulse 1.2s ease-in-out infinite; }
        .status-icon-wrap.connecting { background: rgba(211,188,229,0.12); }
        .status-icon-wrap.connecting svg { color: var(--md-tertiary); fill: var(--md-tertiary); }
        .status-icon-wrap.streaming { background: rgba(124,184,249,0.12); }
        .status-icon-wrap.streaming svg { color: var(--md-primary); fill: var(--md-primary); }
        .status-icon-wrap.error { background: rgba(255,180,171,0.12); }
        .status-icon-wrap.error svg { color: var(--md-error); fill: var(--md-error); }

        .status-text-row {
            display: flex; align-items: center; gap: 6px;
        }
        .status-text {
            font-size: 0.85em; font-weight: 500;
            transition: color 0.3s ease;
        }
        .status-text.idle { color: var(--md-on-surface-variant); }
        .status-text.acquiring { color: var(--md-tertiary); }
        .status-text.connecting { color: var(--md-tertiary); }
        .status-text.streaming { color: var(--md-primary); }
        .status-text.error { color: var(--md-error); }

        .live-badge {
            background: var(--md-primary);
            color: var(--md-on-primary);
            font-size: 0.65em; font-weight: 700;
            padding: 2px 5px; border-radius: 4px;
            display: none;
        }
        .live-badge.visible { display: inline-block; }

        .error-message {
            background: rgba(147,0,10,0.5);
            color: var(--md-on-error-container);
            font-size: 0.75em; padding: 8px;
            border-radius: 12px; text-align: center;
            max-width: 280px; display: none;
        }
        .error-message.visible { display: block; }

        .main-control-card {
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            position: relative;
            flex: 1;
            min-height: 320px;
            padding: 24px 12px;
            gap: 12px;
        }

        .visualizer-ring {
            position: absolute;
            width: min(280px, 65vw); height: min(280px, 65vw);
            border-radius: 50%;
            pointer-events: none;
            opacity: 0; transition: opacity 0.5s ease;
        }
        .visualizer-ring.active { opacity: 1; }
        .visualizer-ring-inner {
            position: absolute; inset: 0;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(124,184,249,0.15) 0%, transparent 70%);
            animation: pulse-ring 2s ease-in-out infinite;
        }
        .visualizer-ring-ripple {
            position: absolute; inset: -20px;
            border-radius: 50%;
            border: 2px solid rgba(124,184,249,0.2);
            animation: ripple-expand 2.5s ease-out infinite;
        }
        .visualizer-ring-ripple:nth-child(2) { animation-delay: 0.8s; }
        .visualizer-ring-ripple:nth-child(3) { animation-delay: 1.6s; }

        @keyframes pulse-ring {
            0%, 100% { transform: scale(0.96); opacity: 0.8; }
            50% { transform: scale(1.04); opacity: 1; }
        }
        @keyframes ripple-expand {
            0% { transform: scale(0.8); opacity: 0.6; }
            100% { transform: scale(1.3); opacity: 0; }
        }

        .main-btn-wrap {
            position: relative; z-index: 2;
            width: 120px; height: 120px;
            display: flex; align-items: center; justify-content: center;
            touch-action: manipulation;
            margin: 8px 0;
        }
        .main-btn-glow {
            position: absolute; inset: -16px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(124,184,249,0.3) 0%, transparent 70%);
            opacity: 0; transition: opacity 0.5s ease;
            pointer-events: none;
        }
        .main-btn-glow.active {
            opacity: 1;
            animation: glow-pulse 1.5s ease-in-out infinite alternate;
        }
        @keyframes glow-pulse {
            0% { opacity: 0.3; transform: scale(0.95); }
            100% { opacity: 0.6; transform: scale(1.05); }
        }

        .main-btn {
            width: 96px; height: 96px;
            border-radius: 50%; border: none;
            cursor: pointer; position: relative;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.4s var(--ease-spring);
            box-shadow: 0 6px 24px rgba(0,0,0,0.35);
            outline: none;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
            -webkit-user-select: none;
            user-select: none;
        }
        .main-btn::after {
            content: ''; position: absolute; inset: 0;
            border-radius: 50%;
            background: radial-gradient(circle at center, rgba(255,255,255,0.2) 0%, transparent 70%);
            opacity: 0; transition: opacity 0.2s ease;
        }
        .main-btn:active::after { opacity: 1; }
        .main-btn.idle {
            background: var(--md-primary);
            width: 96px; height: 96px;
        }
        .main-btn.streaming {
            background: var(--md-error);
            width: 112px; height: 112px;
        }
        .main-btn.connecting {
            background: var(--md-tertiary);
            width: 96px; height: 96px;
        }
        .main-btn.acquiring {
            background: var(--md-tertiary);
            width: 96px; height: 96px;
        }
        .main-btn:active { transform: scale(0.9); }
        .main-btn svg { width: 36px; height: 36px; fill: white; }
        .main-btn.idle svg { fill: white; }
        .main-btn.streaming svg { fill: white; }
        .main-btn.connecting svg {
            fill: white;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        @keyframes mic-pulse {
            0%, 100% { opacity: 0.6; transform: scale(0.9); }
            50% { opacity: 1; transform: scale(1.05); }
        }

        .audio-level {
            width: 80%; max-width: 280px; height: 5px;
            background: var(--md-surface-container-highest);
            border-radius: 3px; overflow: hidden;
            margin-top: 4px;
        }
        .audio-level-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--md-primary), var(--md-tertiary));
            width: 0%; transition: width 0.06s ease;
            border-radius: 3px;
        }

        .bottom-bar {
            position: fixed; bottom: 0; left: 0; right: 0;
            display: flex; align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
            padding-bottom: max(12px, env(safe-area-inset-bottom));
            background: rgba(30, 32, 36, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-top: 1px solid var(--md-outline-variant);
            z-index: 100;
            max-width: 420px;
            margin: 0 auto;
            left: max(0px, env(safe-area-inset-left));
            right: max(0px, env(safe-area-inset-right));
        }
        @supports not (backdrop-filter: blur(1px)) {
            .bottom-bar {
                background: var(--md-surface-container);
            }
        }
        .bottom-left { display: flex; gap: 8px; }

        .pill-btn {
            display: flex; align-items: center; gap: 8px;
            padding: 12px 18px; border: none;
            border-radius: 14px; cursor: pointer;
            font-size: 0.9em; font-weight: 500;
            transition: all 0.2s ease;
            outline: none;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
            min-height: 48px; min-width: 48px;
        }
        .pill-btn:active { transform: scale(0.92); }
        .pill-btn svg { width: 18px; height: 18px; }
        .pill-btn.mute-btn {
            background: var(--md-surface-container-highest);
            color: var(--md-on-surface-variant);
        }
        .pill-btn.mute-btn svg { fill: var(--md-on-surface-variant); }
        .pill-btn.mute-btn.muted {
            background: var(--md-error-container);
            color: var(--md-on-error-container);
        }
        .pill-btn.mute-btn.muted svg { fill: var(--md-on-error-container); }

        .status-dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            background: var(--md-on-surface-variant);
            opacity: 0.3;
            transition: all 0.3s ease;
        }
        .status-dot.streaming {
            background: var(--md-primary);
            opacity: 1;
            animation: dot-pulse 1.2s ease-in-out infinite;
        }
        .status-dot.connecting {
            background: var(--md-tertiary);
            opacity: 1;
        }
        .status-dot.acquiring {
            background: var(--md-tertiary);
            opacity: 1;
            animation: dot-pulse 1.2s ease-in-out infinite;
        }
        .status-dot.error {
            background: var(--md-error);
            opacity: 1;
        }
        @keyframes dot-pulse {
            0%, 100% { transform: scale(0.8); }
            50% { transform: scale(1.2); }
        }

        .help-overlay {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.5);
            z-index: 200;
            display: flex; align-items: flex-end;
            opacity: 0; pointer-events: none;
            transition: opacity 0.3s ease;
        }
        .help-overlay.visible {
            opacity: 1; pointer-events: auto;
        }
        .help-sheet {
            width: 100%; max-width: 420px;
            margin: 0 auto;
            background: rgba(40, 42, 47, 0.92);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border-radius: 20px 20px 0 0;
            padding: 16px 20px 24px;
            padding-bottom: max(24px, env(safe-area-inset-bottom));
            transform: translateY(100%);
            transition: transform 0.4s var(--ease-spring);
        }
        @supports not (backdrop-filter: blur(1px)) {
            .help-sheet {
                background: var(--md-surface-container-high);
            }
        }
        .help-overlay.visible .help-sheet {
            transform: translateY(0);
        }
        .help-sheet-handle {
            width: 36px; height: 4px;
            background: var(--md-outline-variant);
            border-radius: 2px;
            margin: 0 auto 14px;
        }
        .help-sheet-header {
            display: flex; align-items: center;
            justify-content: space-between;
            margin-bottom: 14px;
        }
        .help-sheet-header h3 {
            color: var(--md-primary);
            font-size: 1.05em;
        }
        .help-close-btn {
            width: 36px; height: 36px;
            border: none; background: none;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }
        .help-close-btn:active { background: rgba(255,255,255,0.08); }
        .help-sheet-content {
            font-size: 0.85em; line-height: 2;
            color: var(--md-on-surface-variant);
        }
        .help-sheet-content p {
            padding: 6px 0;
            border-bottom: 1px solid var(--md-outline-variant);
        }
        .help-sheet-content p:last-child { border-bottom: none; }

        .pill-btn.help-btn {
            background: var(--md-surface-container-highest);
            color: var(--md-on-surface-variant);
            padding: 12px;
            justify-content: center;
        }
        .pill-btn.help-btn svg { fill: var(--md-on-surface-variant); }

        .toast {
            position: fixed; top: 16px; top: max(16px, env(safe-area-inset-top));
            left: 50%; transform: translateX(-50%) translateY(-120%);
            background: var(--md-surface-container-high);
            color: var(--md-on-surface);
            padding: 12px 24px;
            border-radius: 14px;
            font-size: 0.85em; font-weight: 500;
            box-shadow: 0 4px 16px rgba(0,0,0,0.4);
            z-index: 300;
            transition: transform 0.45s var(--ease-spring), opacity 0.3s ease;
            pointer-events: none;
            white-space: nowrap;
            opacity: 0;
        }
        .toast.visible {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }
        .toast.success { border-left: 3px solid var(--md-primary); }
        .toast.error { border-left: 3px solid var(--md-error); }

        @media (max-width: 360px) {
            body { padding: 0; }
            .app-container { gap: 8px; padding: 0 10px; padding-bottom: 90px; }
            .card { border-radius: 16px; padding: 10px; }
            .header-card { padding: 10px 12px; }
            .app-icon-badge { width: 32px; height: 32px; border-radius: 10px; }
            .app-icon-badge svg { width: 18px; height: 18px; }
            .header-title { font-size: 0.88em; }
            .main-control-card { min-height: 260px; padding: 16px 8px; }
            .visualizer-ring { width: min(220px, 55vw); height: min(220px, 55vw); }
            .main-btn.idle { width: 80px; height: 80px; }
            .main-btn.streaming { width: 96px; height: 96px; }
            .main-btn.connecting { width: 80px; height: 80px; }
            .main-btn.acquiring { width: 80px; height: 80px; }
            .main-btn svg { width: 28px; height: 28px; }
            .main-btn-wrap { width: 100px; height: 100px; }
            .toast { padding: 10px 18px; font-size: 0.8em; }
        }

        @media (max-height: 600px) {
            .app-container { gap: 6px; padding-bottom: 90px; }
            .main-control-card { min-height: 240px; padding: 12px 8px; }
            .visualizer-ring { width: min(200px, 50vw); height: min(200px, 50vw); }
            .main-btn.idle { width: 72px; height: 72px; }
            .main-btn.streaming { width: 88px; height: 88px; }
            .main-btn.connecting { width: 72px; height: 72px; }
            .main-btn.acquiring { width: 72px; height: 72px; }
            .main-btn svg { width: 26px; height: 26px; }
            .main-btn-wrap { width: 88px; height: 88px; }
            .header-card { padding: 8px 12px; }
        }

        @media (min-width: 600px) {
            .app-container { max-width: 460px; }
            .main-control-card { min-height: 360px; }
            .bottom-bar { max-width: 460px; }
            .help-sheet { max-width: 460px; }
        }
    </style>
</head>
<body>
    <div class="toast" :class="{ visible: toastVisible, success: toastType === 'success', error: toastType === 'error' }" x-text="toastMessage"></div>
    <div class="status-bar-bg"></div>
    <div class="app-container"
        x-data="micYouApp()">

        <div class="card header-card">
            <div class="header-left">
                <div class="app-icon-badge">
                    <svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
                        <path fill="var(--md-primary)" d="M382.714 129.286C422.703 169.276 422.703 234.112 382.714 274.102L328.408 328.408C288.418 368.397 223.582 368.397 183.592 328.408C143.603 288.418 143.603 223.582 183.592 183.592L237.898 129.286C277.888 89.2968 342.724 89.2968 382.714 129.286ZM346.51 165.49C326.515 145.495 294.097 145.495 274.102 165.49L219.796 219.796C199.801 239.791 199.801 272.209 219.796 292.204C239.791 312.199 272.209 312.199 292.204 292.204L346.51 237.898C366.504 217.903 366.504 185.485 346.51 165.49Z"/>
                    </svg>
                </div>
                <div>
                    <div class="header-title">MicYou</div>
                    <div class="header-subtitle">Web Client</div>
                </div>
            </div>
            <div class="lang-dropdown">
                <button class="lang-trigger" :class="{ open: langOpen }" @click="toggleLangMenu()">
                    <svg class="lang-globe" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" x-html="SVG_LANG_GLOBE"></svg>
                    <span class="lang-label" x-text="lang === 'zh' ? '中' : 'EN'"></span>
                    <svg class="lang-chevron" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" x-html="SVG_CHEVRON_DOWN"></svg>
                </button>
                <div class="lang-menu-backdrop" x-show="langOpen" @click="langOpen = false"></div>
                <div class="lang-menu" :class="langOpen ? 'open' : 'closed'">
                    <button class="lang-menu-item" :class="{ active: lang === 'zh' }" @click="setLang('zh'); langOpen = false">
                        <span>中文</span>
                        <svg class="check-mark" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" x-html="SVG_CHECK"></svg>
                    </button>
                    <button class="lang-menu-item" :class="{ active: lang === 'en' }" @click="setLang('en'); langOpen = false">
                        <span>English</span>
                        <svg class="check-mark" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" x-html="SVG_CHECK"></svg>
                    </button>
                </div>
            </div>
        </div>

        <div class="card main-control-card">
            <div class="status-icon-wrap" :class="streamState" id="statusIconWrap">
                <svg id="statusIcon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" x-html="statusIconSvg"></svg>
            </div>
            <div class="status-text-row">
                <span class="status-text" :class="streamState" id="statusText" x-text="statusLabel"></span>
                <span class="live-badge" :class="{ visible: streamState === 'streaming' }" id="liveBadge">LIVE</span>
            </div>
            <div class="error-message" :class="{ visible: streamState === 'error' && errorMessage }" id="errorMessage" x-text="errorMessage"></div>

            <div class="visualizer-ring" :class="{ active: streamState === 'streaming' }" id="visualizerRing">
                <div class="visualizer-ring-inner"></div>
                <div class="visualizer-ring-ripple"></div>
                <div class="visualizer-ring-ripple"></div>
                <div class="visualizer-ring-ripple"></div>
            </div>

            <div class="main-btn-wrap">
                <div class="main-btn-glow" :class="{ active: streamState === 'streaming' }" id="mainBtnGlow"></div>
                <button class="main-btn idle" :class="mainBtnClass" id="mainBtn" @click="onMainButtonClick()">
                    <svg id="mainBtnIcon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" x-html="mainBtnIconSvg"></svg>
                </button>
            </div>

            <div class="audio-level" x-show="streamState === 'streaming'"><div id="levelBar" class="audio-level-bar" :style="'width: ' + audioLevel + '%'"></div></div>
        </div>

        <div class="bottom-bar">
            <div class="bottom-left">
                <button class="pill-btn mute-btn" :class="{ muted: isMuted }" id="muteBtn" @click="toggleMute()">
                    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" x-html="muteIconSvg"></svg>
                    <span id="muteLabel" x-text="muteLabel"></span>
                </button>
                <button class="pill-btn help-btn" @click="showHelp = !showHelp">
                    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" x-html="SVG_HELP"></svg>
                </button>
            </div>
            <div class="status-dot" :class="streamState !== 'idle' ? streamState : ''" id="statusDot"></div>
        </div>

        <div class="help-overlay" :class="{ visible: showHelp }" @click.self="showHelp = false">
            <div class="help-sheet">
                <div class="help-sheet-handle"></div>
                <div class="help-sheet-header">
                    <h3 x-text="helpTitle"></h3>
                    <button class="help-close-btn" @click="showHelp = false">
                        <svg viewBox="0 0 24 24" width="20" height="20"><path fill="var(--md-on-surface-variant)" d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
                    </button>
                </div>
                <div class="help-sheet-content">
                    <p x-text="helpStep1"></p>
                    <p x-text="helpStep2"></p>
                    <p x-text="helpStep3"></p>
                </div>
            </div>
        </div>
    </div>
    <script>
        const AUDIO_WORKLET_CODE = `
            class MicYouProcessor extends AudioWorkletProcessor {
                process(inputs, outputs, parameters) {
                    const input = inputs[0];
                    if (input && input.length > 0) {
                        const channelData = input[0];
                        if (channelData && channelData.length > 0) {
                            this.port.postMessage(new Float32Array(channelData));
                        }
                    }
                    return true;
                }
            }
            registerProcessor('mic-you-processor', MicYouProcessor);
        `;
        const workletBlobUrl = URL.createObjectURL(
            new Blob([AUDIO_WORKLET_CODE], { type: 'application/javascript' })
        );

        function micYouApp() {
            return {
                lang: 'zh',
                streamState: 'idle',
                isMuted: false,
                showHelp: false,
                langOpen: false,
                audioLevel: 0,
                errorMessage: '',
                toastMessage: '',
                toastVisible: false,
                toastType: 'success',
                toastTimer: null,

                SVG_LINK: '<path d="M3.9 12c0-1.71 1.39-3.1 3.1-3.1h4V7H7c-2.76 0-5 2.24-5 5s2.24 5 5 5h4v-1.9H7c-1.71 0-3.1-1.39-3.1-3.1zM8 13h8v-2H8v2zm9-6h-4v1.9h4c1.71 0 3.1 1.39 3.1 3.1s-1.39 3.1-3.1 3.1h-4V17h4c2.76 0 5-2.24 5-5s-2.24-5-5-5z"/>',
                SVG_LINK_OFF: '<path d="M17 7h-4v1.9h4c1.71 0 3.1 1.39 3.1 3.1 0 .87-.36 1.65-.93 2.22l1.42 1.42C18.95 14.48 19.7 13.32 19.7 12c0-2.76-2.24-5-5-5zm-2.01 4.98l1.53 1.53c.05-.16.08-.33.08-.51 0-1.66-1.34-3-3-3h-.02l1.41 1.98zM7 5h4v1.9H8.9L7 5.88V5zm11.56 14.56L5.44 6.44 3.02 4.02 1.6 5.44 4.07 7.91C2.79 8.88 2 10.36 2 12c0 2.76 2.24 5 5 5h4v-1.9H7c-1.71 0-3.1-1.39-3.1-3.1 0-1.1.58-2.06 1.44-2.61l1.37 1.37C6.29 11.07 6 11.5 6 12c0 .55.45 1 1 1h3.5l2 2H8v1.9h6.6L17.56 19.98l1.42-1.42z"/>',
                SVG_REFRESH: '<path d="M17.65 6.35C16.2 4.9 14.21 4 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/>',
                SVG_INFO: '<path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-6h2v6zm0-8h-2V7h2v2z"/>',
                SVG_HOURGLASS: '<path d="M6 2v6h.01L6 8.01 10 12l-4 4 .01.01H6V22h12v-5.99h-.01L18 16l-4-4 4-3.99-.01-.01H18V2H6zm10 14.5V20H8v-3.5l4-4 4 4zm-4-5l-4-4V4h8v3.5l-4 4z"/>',
                SVG_CHECK_CIRCLE: '<path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/>',
                SVG_ERROR: '<path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/>',
                SVG_MIC: '<path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm-1-9c0-.55.45-1 1-1s1 .45 1 1v6c0 .55-.45 1-1 1s-1-.45-1-1V5zm6 6c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>',
                SVG_MIC_OFF: '<path d="M19 11h-1.7c0 .74-.16 1.43-.43 2.05l1.23 1.23c.56-.98.9-2.09.9-3.28zm-4.02.17c0-.06.02-.11.02-.17V5c0-1.66-1.34-3-3-3S9 3.34 9 5v.18l5.98 5.99zM4.27 3L3 4.27l6.01 6.01V11c0 1.66 1.34 3 3 3 .23 0 .44-.03.65-.07l1.66 1.66c-.71.33-1.5.52-2.31.52-2.76 0-5.3-2.1-5.3-5.1H5c0 3.41 2.72 6.23 6 6.72V21h2v-3.28c.91-.13 1.77-.45 2.54-.9L19.73 21 21 19.73 4.27 3z"/>',
                SVG_HELP: '<path d="M11 18h2v-2h-2v2zm1-16C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm0-14c-2.21 0-4 1.79-4 4h2c0-1.1.9-2 2-2s2 .9 2 2c0 2-3 1.75-3 5h2c0-2.25 3-2.5 3-5 0-2.21-1.79-4-4-4z"/>',
                SVG_LANG_GLOBE: '<path d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zm6.93 6h-2.95c-.32-1.25-.78-2.45-1.38-3.56 1.84.63 3.37 1.91 4.33 3.56zM12 4.04c.83 1.2 1.48 2.53 1.91 3.96h-3.82c.43-1.43 1.08-2.76 1.91-3.96zM4.26 14C4.1 13.36 4 12.69 4 12s.1-1.36.26-2h3.38c-.08.66-.14 1.32-.14 2 0 .68.06 1.34.14 2H4.26zm.82 2h2.95c.32 1.25.78 2.45 1.38 3.56-1.84-.63-3.37-1.9-4.33-3.56zm2.95-8H5.08c.96-1.66 2.49-2.93 4.33-3.56C8.81 5.55 8.35 6.75 8.03 8zM12 19.96c-.83-1.2-1.48-2.53-1.91-3.96h3.82c-.43 1.43-1.08 2.76-1.91 3.96zM14.34 14H9.66c-.09-.66-.16-1.32-.16-2 0-.68.07-1.35.16-2h4.68c.09.65.16 1.32.16 2 0 .68-.07 1.34-.16 2zm.25 5.56c.6-1.11 1.06-2.31 1.38-3.56h2.95c-.96 1.65-2.49 2.93-4.33 3.56zM16.36 14c.08-.66.14-1.32.14-2 0-.68-.06-1.34-.14-2h3.38c.16.64.26 1.31.26 2s-.1 1.36-.26 2h-3.38z"/>',
                SVG_CHEVRON_DOWN: '<path d="M7.41 8.59L12 13.17l4.59-4.58L18 10l-6 6-6-6 1.41-1.41z"/>',
                SVG_CHECK: '<path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41L9 16.17z"/>',

                ws: null,
                audioContext: null,
                workletNode: null,
                stream: null,

                get statusIconSvg() {
                    switch (this.streamState) {
                        case 'acquiring': return this.SVG_MIC;
                        case 'connecting': return this.SVG_HOURGLASS;
                        case 'streaming': return this.SVG_CHECK_CIRCLE;
                        case 'error': return this.SVG_ERROR;
                        default: return this.SVG_INFO;
                    }
                },

                get mainBtnIconSvg() {
                    switch (this.streamState) {
                        case 'acquiring': return this.SVG_MIC;
                        case 'connecting': return this.SVG_REFRESH;
                        case 'streaming': return this.SVG_LINK_OFF;
                        default: return this.SVG_LINK;
                    }
                },

                get mainBtnClass() {
                    let cls = 'main-btn ' + this.streamState;
                    return cls;
                },

                get muteIconSvg() {
                    return this.isMuted ? this.SVG_MIC_OFF : this.SVG_MIC;
                },

                get statusLabel() {
                    if (this.streamState === 'error') return this.lang === 'zh' ? '麦克风访问失败，请检查权限' : 'Microphone access failed, check permissions';
                    const labels = {
                        idle: { zh: '点击开始', en: 'Click to start' },
                        acquiring: { zh: '获取麦克风权限...', en: 'Requesting Microphone...' },
                        connecting: { zh: '连接服务器...', en: 'Connecting to Server...' },
                        streaming: { zh: '传输中', en: 'Streaming' }
                    };
                    return labels[this.streamState]?.[this.lang] || '';
                },

                get muteLabel() {
                    return this.isMuted
                        ? (this.lang === 'zh' ? '取消静音' : 'Unmute')
                        : (this.lang === 'zh' ? '静音' : 'Mute');
                },

                get helpTitle() {
                    return this.lang === 'zh' ? '使用说明' : 'Instructions';
                },

                get helpStep1() {
                    return this.lang === 'zh' ? '1. 点击中央按钮开始传输音频' : '1. Click the center button to start audio streaming';
                },

                get helpStep2() {
                    return this.lang === 'zh' ? '2. 浏览器会请求麦克风权限，请点击允许' : '2. Browser will request microphone permission, please allow it';
                },

                get helpStep3() {
                    return this.lang === 'zh' ? '3. 首次访问需信任自签名证书，点击「继续」即可' : '3. First visit requires trusting self-signed certificate, click Continue';
                },

                setLang(l) {
                    this.lang = l;
                },

                toggleLangMenu() {
                    this.langOpen = !this.langOpen;
                },

                vibrate(pattern) {
                    if (navigator.vibrate) {
                        navigator.vibrate(pattern);
                    }
                },

                showToast(msg, type = 'success') {
                    if (this.toastTimer) clearTimeout(this.toastTimer);
                    this.toastMessage = msg;
                    this.toastType = type;
                    this.toastVisible = true;
                    this.toastTimer = setTimeout(() => {
                        this.toastVisible = false;
                    }, 2000);
                },

                onMainButtonClick() {
                    this.vibrate(10);
                    if (this.streamState === 'streaming' || this.streamState === 'connecting' || this.streamState === 'acquiring') {
                        this.stopStreaming();
                    } else {
                        this.startStreaming();
                    }
                },

                toggleMute() {
                    this.isMuted = !this.isMuted;
                    this.vibrate(8);
                    const msg = this.isMuted
                        ? (this.lang === 'zh' ? '已静音' : 'Muted')
                        : (this.lang === 'zh' ? '已取消静音' : 'Unmuted');
                    this.showToast(msg);
                },

                async startStreaming() {
                    this.streamState = 'acquiring';
                    this.errorMessage = '';

                    try {
                        this.stream = await navigator.mediaDevices.getUserMedia({
                            audio: {
                                sampleRate: 48000,
                                channelCount: 1,
                                echoCancellation: false,
                                noiseSuppression: false,
                                autoGainControl: false
                            }
                        });

                        this.streamState = 'connecting';
                        this.audioContext = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 48000 });
                        const source = this.audioContext.createMediaStreamSource(this.stream);

                        await this.audioContext.audioWorklet.addModule(workletBlobUrl);
                        this.workletNode = new AudioWorkletNode(this.audioContext, 'mic-you-processor');

                        const wsUrl = (location.protocol === 'https:' ? 'wss://' : 'ws://') + location.host + '/ws';
                        this.ws = new WebSocket(wsUrl);
                        this.ws.binaryType = 'arraybuffer';

                        this.ws.onopen = () => {
                            this.streamState = 'streaming';
                            this.showToast(
                                this.lang === 'zh' ? '音频传输中' : 'Streaming Audio',
                                'success'
                            );
                        };

                        this.ws.onmessage = (e) => {
                            if (e.data === 'SERVER_STOP') {
                                this.stopStreaming();
                            }
                        };

                        this.ws.onclose = () => {
                            if (this.streamState === 'streaming') {
                                this.showToast(
                                    this.lang === 'zh' ? '连接已断开' : 'Connection Lost',
                                    'error'
                                );
                            }
                            this.streamState = 'idle';
                        };

                        this.ws.onerror = () => {
                            this.errorMessage = this.lang === 'zh'
                                ? '连接失败，请检查网络'
                                : 'Connection Error, please check network';
                            this.showToast(this.errorMessage, 'error');
                            this.streamState = 'error';
                            this.stopStreaming();
                        };

                        const self = this;
                        this.workletNode.port.onmessage = function (e) {
                            if (self.ws && self.ws.readyState === WebSocket.OPEN) {
                                const inputData = e.data;
                                if (self.isMuted) {
                                    const silentData = new Float32Array(inputData.length);
                                    self.ws.send(silentData.buffer);
                                } else {
                                    self.ws.send(inputData.buffer);
                                }
                                let sum = 0;
                                for (let i = 0; i < inputData.length; i++) {
                                    sum += inputData[i] * inputData[i];
                                }
                                const rms = Math.sqrt(sum / inputData.length);
                                self.audioLevel = Math.min(100, rms * 500);
                            }
                        };

                        source.connect(this.workletNode);
                        this.workletNode.connect(this.audioContext.destination);

                    } catch (err) {
                        const msgZh = '麦克风访问失败，请在浏览器设置中允许麦克风权限';
                        const msgEn = 'Microphone access failed. Allow microphone permission in browser settings';
                        this.errorMessage = this.lang === 'zh' ? msgZh : msgEn;
                        this.showToast(this.errorMessage, 'error');
                        this.streamState = 'error';
                        console.error('MicYou WebAudio error:', err);
                    }
                },

                stopStreaming() {
                    if (this.workletNode) {
                        this.workletNode.disconnect();
                        this.workletNode = null;
                    }
                    if (this.audioContext) {
                        this.audioContext.close();
                        this.audioContext = null;
                    }
                    if (this.stream) {
                        this.stream.getTracks().forEach(t => t.stop());
                        this.stream = null;
                    }
                    if (this.ws) {
                        this.ws.close();
                        this.ws = null;
                    }
                    this.streamState = 'idle';
                    this.audioLevel = 0;
                }
            };
        }
    </script>
